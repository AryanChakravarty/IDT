  # Part 37: Other Expenses - Car Parking Charges
  car_parking_charges:
    name: "Car Parking Charges"
    part: "Other expenses"
    sub_part: "Car Parking Charges"
    description: "Verification of car parking as staff welfare vs perquisite"
    verification_points:
      - "Whether it is a common benefit of employees for such car parking and is in the nature of staff welfare and not a perquisite in the hands of employees?"
      - "Whether there is a demarketed car parking space to accommodate parking for employees. To be substantiated by way of an agreement entered by the company with building owner/service provider"
    keywords: ["car parking", "staff welfare", "perquisite", "employees", "agreement"]
    verification_prompt: |
      Verify:
      1. Car parking charges nature and purpose
      2. Whether it constitutes staff welfare or perquisite
      3. Demarcated parking space availability
      4. Agreement with building owner/service provider
      Provide specific references and documentation requirements.

  # Part 38: Other Expenses - Gardening Charges
  gardening_charges:
    name: "Gardening Charges"
    part: "Other expenses"
    sub_part: "Gardening Charges"
    description: "Verification of gardening charges as CSR activity"
    verification_points:
      - "Whether the employer incurs cost in maintaining factory premises in an eco-friendly manner as a part of CSR activity"
    keywords: ["gardening", "factory premises", "eco-friendly", "CSR"]
    verification_prompt: |
      Check for:
      1. Gardening charges and their purpose
      2. Factory premises maintenance
      3. Eco-friendly practices
      4. CSR activity classification
      Provide specific references and documentation requirements. 